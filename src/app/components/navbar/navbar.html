<nav class="navbar navbar-expand-lg fixed-top retro-navbar">
  <div class="retro-navbar-tape">
    <div class="container retro-navbar-tape-inner">
      <span>boom bap sneakers</span>
      <span>street archive</span>
      <span>fresh drops</span>
    </div>
  </div>

  <div class="container navbar-layout">
    <button
      type="button"
      class="navbar-brand brand-button"
      (click)="goToHome()"
    >
      <span class="brand-mark">Sneaker Store</span>
      <span class="brand-submark">rap tape edition</span>
    </button>

    <div class="navbar-search-wrapper">
      <form
        class="d-flex gap-2 w-100 retro-search-form"
        [formGroup]="searchForm"
        (ngSubmit)="submitSearch()"
      >
        <input
          type="search"
          class="form-control retro-search-input"
          formControlName="term"
          placeholder="Busque seu pisante..."
        />
        <button type="submit" class="btn retro-btn retro-btn-primary navbar-search-submit">
          Buscar
        </button>
      </form>
    </div>

    <div class="navbar-actions desktop-actions">
      <button
        type="button"
        class="btn retro-btn retro-btn-outline retro-nav-button"
        (click)="goToCart()"
      >
        Carrinho
      </button>

      <button
        type="button"
        class="btn retro-btn retro-btn-dark retro-nav-button d-flex align-items-center gap-2"
        (click)="goToUser()"
      >
        <span class="nav-icon"><img src="/user-icon.svg" alt="User Icon"></span>
        <span class="d-none d-md-inline">{{ currentUserLabel }}</span>
      </button>
    </div>

    <button
      type="button"
      class="mobile-menu-toggle"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen"
      [attr.aria-label]="isMobileMenuOpen ? 'Fechar menu' : 'Abrir menu'"
    >
      <img
        [src]="isMobileMenuOpen ? '/menu-x-icon.svg' : '/menu-icon.svg'"
        [alt]="isMobileMenuOpen ? 'Fechar menu' : 'Abrir menu'"
      />
    </button>
  </div>

  <button
    type="button"
    class="mobile-menu-overlay"
    [class.is-open]="isMobileMenuOpen"
    (click)="closeMobileMenu()"
    aria-label="Fechar menu lateral"
  ></button>

  <div class="mobile-menu-panel" [class.is-open]="isMobileMenuOpen">
    <div class="mobile-menu-header">
      <span class="retro-kicker">Street menu</span>
      <p class="mobile-menu-copy mb-0">
        Acesso rapido ao seu carrinho e perfil.
      </p>
    </div>

    <button
      type="button"
      class="btn retro-btn retro-btn-outline mobile-menu-action"
      (click)="goToCart()"
    >
      Carrinho
    </button>

    <button
      type="button"
      class="btn retro-btn retro-btn-dark mobile-menu-action d-flex align-items-center justify-content-center gap-2"
      (click)="goToUser()"
    >
      <span class="nav-icon"><img src="/user-icon.svg" alt="User Icon"></span>
      <span>{{ currentUserLabel }}</span>
    </button>
  </div>
</nav>
