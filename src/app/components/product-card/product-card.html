<div class="card border-0 shadow-sm h-100 product-card">
  <div class="position-relative product-card-media">
    <img
      [src]="product.image"
      [alt]="product.name"
      class="card-img-top product-image"
    />

    <span
      class="badge product-badge product-badge-featured"
      *ngIf="product.featured"
    >
      Featured
    </span>

    <span
      class="badge bg-danger product-badge product-badge-stock"
      *ngIf="product.stock === 0"
    >
      Sem estoque
    </span>
  </div>

  <div class="card-body d-flex flex-column">
    <div class="product-card-meta mb-3">
      <span class="retro-mini-chip">{{ product.brand || 'Street label' }}</span>
      <span class="retro-mini-chip" *ngIf="product.line">{{ product.line }}</span>
    </div>

    <h2 class="h5 card-title mb-2 product-card-title">{{ product.name }}</h2>

    <p class="product-card-caption mb-4">
      {{ product.category || 'Lifestyle' }}
      <span *ngIf="product.colorway"> / {{ product.colorway }}</span>
    </p>

    <div class="product-card-footer mt-auto">
      <p class="fw-bold fs-5 product-card-price mb-0">
        {{ product.price | currency: 'BRL' : 'symbol' : '1.2-2' }}
      </p>

      <span class="product-card-stock" [class.is-out]="product.stock === 0">
        {{ product.stock }} em estoque
      </span>
    </div>

    <button
      type="button"
      class="btn retro-btn retro-btn-primary mt-4"
      (click)="goToProduct()"
      [disabled]="product.stock === 0"
    >
      {{ product.stock === 0 ? 'Sold out' : 'Ver o drop' }}
    </button>
  </div>
</div>
