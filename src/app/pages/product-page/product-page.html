<div class="container py-4">
  <button type="button" class="btn btn-outline-secondary mb-4" (click)="goBackHome()">
    Voltar
  </button>

  <ng-container *ngIf="ready$ | async; else loadingState">
    <ng-container *ngIf="product$ | async as product; else notFoundState">
      <div class="row g-4 align-items-start">
        <div class="col-12 col-lg-6">
          <div class="card border-0 shadow-sm">
            <img
              [src]="product.image"
              [alt]="product.name"
              class="img-fluid product-detail-image"
            />
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h1 class="h2 mb-3">{{ product.name }}</h1>

              <p class="text-muted mb-3">
                {{ product.description }}
              </p>

              <p class="fs-3 fw-bold mb-3">
                {{ product.price | currency: 'BRL' : 'symbol' : '1.2-2' }}
              </p>

              <p class="mb-4" [class.text-danger]="product.stock === 0" [class.text-success]="product.stock > 0">
                Estoque disponível: {{ product.stock }}
              </p>

              <div class="mb-4">
                <label class="form-label fw-semibold d-block">
                  Selecione o tamanho
                </label>

                <div class="d-flex flex-wrap gap-2">
                  <button
                    type="button"
                    class="btn"
                    *ngFor="let size of product.sizes"
                    [ngClass]="selectedSize === size ? 'btn-dark' : 'btn-outline-dark'"
                    (click)="selectSize(size)"
                  >
                    {{ size }}
                  </button>
                </div>
              </div>

              <div
                class="alert"
                *ngIf="message"
                [ngClass]="messageType === 'success' ? 'alert-success' : 'alert-danger'"
              >
                {{ message }}
              </div>

              <button
                type="button"
                class="btn btn-dark btn-lg w-100"
                (click)="addToCart(product)"
                [disabled]="product.stock === 0"
              >
                Adicionar ao carrinho
              </button>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
  </ng-container>

  <ng-template #loadingState>
    <div class="alert alert-info">Carregando produto...</div>
  </ng-template>

  <ng-template #notFoundState>
    <div class="alert alert-warning">Produto não encontrado.</div>
  </ng-template>
</div>
